<!DOCTYPE html>
<html>
    <head>
        <title>Agasym</title>
        <link rel="stylesheet" href="./../css/index.css">
    </head>
    <body>
        <div id="wrapper">
            <h1>
                AGASYM
            </h1>
            <div id="option-wrapper">
                <input type="text" id="uname" placeholder="Name...">
                <input type="text" id="pwd" placeholder="Passwort...">
                <input type="text" id="pwd-repeat" placeholder="Passwort wiederholen...">
                <div class="button" id="register-button">
                    Register
                </div>
                <div class="button" id="login-button">
                    Login
                </div>
                <div class="button" id="return-button">
                    Return
                </div>
            </div>
        </div>
        <script type="module" src="./../js/register.js"></script>
    </body>
</html>
